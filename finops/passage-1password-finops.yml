- Passwordless
- Identity
- FinOps
- Cost Management
- FOCUS
description: >-
  FinOps view of Passage by 1Password spend. Passage bills primarily on
  monthly active users (MAUs) - a free allotment (reported ~1,000 MAUs) with
  per-MAU usage above that, plus an enterprise tier. The Management API,
  magic links, and passkey flows are bundled with the platform rather than
  metered as separate line items. NOTE - the Passage product is slated for
  retirement on 2026-01-16; figures here are not reconciled.
notes: >-
  Per-MAU rates and the free threshold come from third-party listings and may
  be outdated given the product's planned retirement. Verify against
  1Password / Passage billing before relying on this artifact.
sources:
- https://passage.1password.com
- https://docs.passage.id/home
- https://focus.finops.org/focus-specification/v1-3/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: 1Password
serviceCategory: Identity and Access Management
billingModel:
  pricingCategory: Usage-Based
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
  - Usage
  - Purchase
focusColumns:
  ServiceName: Passage by 1Password
  ServiceCategory: Identity and Access Management
  ProviderName: 1Password
  PublisherName: 1Password
  InvoiceIssuerName: 1Password
  BillingCurrency: USD
  ChargeCategory: Usage
  PricingCategory: Usage-Based
meters:
- name: monthly_active_users
  description: Distinct users who authenticated within the billing month, billed per MAU above the free allotment.
  unit: users
  aggregation: max
  dimensions:
  - app
- name: magic_links_sent
  description: Magic links delivered by Passage (informational; bundled with the platform, not separately metered).
  unit: messages
  aggregation: sum
  dimensions:
  - app
  - channel
principles:
- name: Visibility
  description: Track MAU counts per Passage app in the Console; watch the free-tier threshold.
- name: Allocation
  description: Use one Passage app (and API key) per product/environment to map MAU spend to teams.
- name: Optimization
  description: Consolidate low-traffic environments; given the 2026-01-16 retirement, plan migration to a supported auth provider to avoid stranded spend.
- name: Accountability
  description: Assign an owner per Passage app; review MAU growth monthly against budget and the retirement timeline.
maintainers:
