specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Passage by 1Password
providerId: passage-1password
created: '2026-06-20'
modified: '2026-06-20'
reconciled: false
tags:
- Authentication
- Passkeys
- WebAuthn
- Passwordless
- Identity
- Plans
description: >-
  Passage by 1Password is priced on monthly active users (MAUs). Widely
  reported terms put the first 1,000 MAUs free, with usage above that billed
  at roughly $0.02-$0.05 per MAU per month depending on edition, plus an
  enterprise tier with negotiated terms. The Management API and magic links
  are included with the platform rather than metered separately. NOTE - the
  Passage product is slated for retirement on 2026-01-16; exact, current
  pricing is not reconciled here.
notes: >-
  MAU thresholds and per-MAU rates are drawn from third-party pricing
  listings, not a live first-party pricing page, and the product is being
  retired. Verify against passage.1password.com / 1Password sales before
  relying on these figures.
sources:
- https://passage.1password.com
- https://docs.passage.id/home
- https://www.g2.com/products/passage-by-1password/pricing
plans:
- id: passage-free
  name: Free
  type: free
  description: >-
    Free tier covering the first ~1,000 monthly active users, including
    passkeys, magic links, and the Management API.
  entries:
  - label: Monthly Active Users (included)
    name: mau_free
    type: free
    metric: monthly_active_users
    limit: 1000
    timeFrame: month
    geo: global
    unit: 1
    price: $0.00
    userMultiplied: false
  elements:
  - name: Passkeys (WebAuthn)
  - name: Magic Links
  - name: Management API
- id: passage-usage
  name: Usage (per MAU)
  type: usage
  description: >-
    Monthly active users above the free allotment, billed per MAU. Reported
    rates range roughly $0.02-$0.05 per MAU depending on edition.
  entries:
  - label: Monthly Active Users (overage)
    name: mau_overage
    type: usage
    metric: monthly_active_users
    limit: -1
    timeFrame: month
    geo: global
    unit: 1
    price: ~$0.02-$0.05 per MAU (reported; verify)
    userMultiplied: false
  elements:
  - name: Passkeys (WebAuthn)
  - name: Magic Links
  - name: Management API
- id: passage-enterprise
  name: Enterprise
  type: enterprise
  description: >-
    Volume commitments, advanced support, and negotiated terms. Contact
    1Password / Passage sales.
  entries:
  - label: Enterprise Agreement
    name: enterprise
    type: flat
    metric: contract
    limit: -1
    timeFrame: year
    geo: global
    unit: 1
    price: contact sales
    userMultiplied: false
  elements:
  - name: Custom Volume Pricing
  - name: Advanced Support
maintainers:
- FN: Kin Lane
  email: kin@apievangelist.com
